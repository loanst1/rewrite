<body>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(() => {
        setTimeout(() => window.location.replace("https://ansteyapps.com/rewrite/"), 1000);
      }).catch(() => {
        window.location.replace("https://ansteyapps.com/rewrite/");
      });
    } else {
      window.location.replace("https://ansteyapps.com/rewrite/");
    }
  </script>

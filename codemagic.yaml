workflows:
  ios-app-store:
    name: ReWrite — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Ansteyapps Limited Apple
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ansteyapps.rewrite
      vars:
        APP_STORE_APPLE_ID: 6765872586
        BUNDLE_ID: "com.ansteyapps.rewrite"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.11.1
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: cd ios/App && pod install
      - name: Set build number from Codemagic build counter
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build .ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
      email:
        recipients:
          - support@ansteyapps.com
        notify:
          success: true
          failure: true

  android-google-play:
    name: ReWrite — Android Google Play
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - rewrite_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.ansteyapps.rewrite"
      node: 20.11.1
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Set build number
        script: |
          cd android
          # Bumps versionCode automatically using Codemagic's build counter
          sed -i "s/versionCode .*/versionCode $(($BUILD_NUMBER + 3))/" app/build.gradle
      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
        submit_as_draft: true
      email:
        recipients:
          - support@ansteyapps.com
        notify:
          success: true
          failure: true
